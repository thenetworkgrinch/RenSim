site_name: RemSim
repo_url: https://github.com/Ruthie-FRC/RemSim
repo_name: Ruthie-FRC/RemSim
site_description: >-
  RemSim is a modular FRC physics library.
site_author: Ruthie-FRC
edit_uri: edit/main/mkdocs/docs/

theme:
  name: material
 # logo: assets/logo.png
 # favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - announce.dismiss
    - header.autohide

nav:
  - Home: index.md
  - API Usage: api_usage.md
  - Architecture: architecture.md
  - Physics Reference: physics_reference.md
  - Math:
      - Integrators: integrators.md
      - Vector3: vector.md
      - Quaternion: quaternion.md

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
